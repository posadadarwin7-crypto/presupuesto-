<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Cloud Presupuestos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "presupuesto-4961d.firebaseapp.com",
            projectId: "presupuesto-4961d",
            storageBucket: "presupuesto-4961d.firebasestorage.app",
            messagingSenderId: "795833178613",
            appId: "1:795833178613:web:52322f0fa981766bac68bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Lógica de Login
        window.login = () => signInWithPopup(auth, provider);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
            }
        });

        // Guardar Inventario en Firestore
        window.saveInventario = async () => {
            const ean = document.getElementById('inv_ean').value;
            const desc = document.getElementById('inv_art').value;
            const precio = parseFloat(document.getElementById('inv_precio').value);
            
            await addDoc(collection(db, "inventario"), { ean, desc, precio, uid: auth.currentUser.uid });
            alert("Artículo guardado en la nube");
        };
    </script>
</head>
<body class="bg-gray-100">

    <div id="loginSection" class="h-screen flex items-center justify-center">
        <button onclick="login()" class="bg-white p-4 shadow rounded border font-bold">Iniciar sesión con Google</button>
    </div>

    <div id="appSection" class="hidden max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Panel Principal</h1>
            <button onclick="alert('Ir a Configuración')" class="text-2xl">⚙️</button>
        </header>

        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="font-bold mb-4">Añadir al Inventario</h2>
            <input type="text" id="inv_ean" placeholder="EAN" class="border p-2 w-full mb-2">
            <input type="text" id="inv_art" placeholder="Descripción" class="border p-2 w-full mb-2">
            <input type="number" id="inv_precio" placeholder="Precio" class="border p-2 w-full mb-2">
            <button onclick="saveInventario()" class="bg-blue-600 text-white p-2 w-full">Guardar en Firebase</button>
        </div>
    </div>
</body>
</html>
